<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Que País você mora</title>
</head>
<body>
    Que país você mora: <input type="text" name="txtpais" id="txtpais" >
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res">

    </div>
    <script>
        function verificar() {
            var txtv = document.querySelector('input#txtpais');
            var res = document.querySelector('div#res');
            var pais = txtv.value; 

            res.innerHTML = `<p>Seu País é <strong>${pais}</strong>!</p>`;

            // Comparamos com 'brasil' tudo em minúsculo
            if (pais.toLowerCase() === 'brasil') {
                res.innerHTML += `<p>Você é Brasileiro!</p>`;
            } else {
                res.innerHTML += `<p>Você é Estrangeiro!</p>`;
            }
        }   
    </script>
</body>
</html>
