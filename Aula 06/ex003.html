<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo JavaScript</title>
    <style>
        body {
            font: normal 20px Arial, sans-serif;
            background-color: #61ebde;
            color: #850000;;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Aprendendo JavaScript!</p>
    <script>
        var n1 = window.prompt('Digite um número:');
        var n2 = window.prompt('Digite outro número:');
        var valor = n1.replace(',', '.');// Substitui a vírgula por ponto para garantir que seja interpretado como número decimal
        var valor2 = n2.replace(',', '.');
        var s = Number(valor) + Number(valor2);// Converte as strings para números antes de realizar a soma
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`);
    </script>
</body>
</html>
