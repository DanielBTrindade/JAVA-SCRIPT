<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <div>
        <h1>Sistema de multas</h1>
        Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> Km/h
        <input type="button" value="Verificar" onclick="calcular()">

    </div>
    <div id="res">

    </div>
    <script>
        function calcular() {
            var txtv = document.querySelector('input#txtvel')
            var res = document.querySelector('div#res')
            var vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade é de <strong> ${vel} Km/h.</strong></p>`
            if (vel > 60) {
                res.innerHTML +=`<p>Você Excedeu o limite de velocidade, você foi <strong>MULTADO!!!</strong></p>`
            }else{
                res.innerHTML+= `<p>Você está dentro do limite de velocidade!</p>`
            }
            res.innerHTML += `<p>Dirija Sempre com segurança!</p>`
        }
    </script>
</body>
</html>
