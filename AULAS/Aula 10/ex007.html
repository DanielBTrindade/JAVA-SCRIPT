<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Valores</title>
    <style>
        body {
            font: normal 20pt Arial;
            }
        #painel {
            background: gray;
            color: white;
            width: 500px;        /* Aumentei um pouco para não cortar o título */
            min-height: 200px;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        } /* A chave que estava faltando aqui! */

        input {
            font: normal 15pt Arial;
            width: 100px;
            margin-bottom: 10px;
        }

        div#res {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="painel">
        <h1>Somando Valores</h1>
        <input type="number" name="txtn1" id="txtn1"> + 
        <input type="number" name="txtn2" id="txtn2">
        <input type="button" value="Somar" onclick="somar()">
        <div id="res">Resultado: </div>
    </div>
    <script>
        function somar(){
            var tn1 = document.querySelector('input#txtn1')
            var tn2 = document.getElementById('txtn2')
            var res = document.querySelector('div#res')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var s = n1 + n2
            res.innerHTML = `A soma de ${n1} + ${n2} é ${s}`
            tn1.value = ''
            tn2.value = ''

        }
    </script>
</body>
</html>
